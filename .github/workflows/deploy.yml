name: Deploy to AWS Amplify

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'dev'
      - 'staging'
  delete:
    branches:
      - 'feature/**'
      - 'dev'
      - 'staging'

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: 24

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Ensure Amplify branch exists
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          aws amplify create-branch \
            --app-id ${{ vars.AMPLIFY_APP_ID }} \
            --branch-name "$BRANCH_NAME" \
            2>/dev/null || echo "Branch already exists — OK"

      - name: Cache Amplify backend artifacts
        uses: actions/cache@v4
        with:
          path: |
            .amplify
            node_modules/.cache
          key: amplify-backend-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('amplify/**') }}
          restore-keys: |
            amplify-backend-${{ runner.os }}-${{ github.ref_name }}-
            amplify-backend-${{ runner.os }}-

      - name: Deploy backend
        run: npx ampx pipeline-deploy --branch ${{ github.ref_name }} --app-id ${{ vars.AMPLIFY_APP_ID }}

      - name: Build frontend
        run: npm run build

      - name: Deploy frontend to Amplify Hosting
        run: |
          DEPLOYMENT=$(aws amplify create-deployment \
            --app-id ${{ vars.AMPLIFY_APP_ID }} \
            --branch-name ${{ github.ref_name }} \
            --query '{jobId: jobId, zipUploadUrl: zipUploadUrl}' \
            --output json)

          UPLOAD_URL=$(echo $DEPLOYMENT | jq -r '.zipUploadUrl')
          JOB_ID=$(echo $DEPLOYMENT | jq -r '.jobId')

          cd dist && zip -r ../deployment.zip . && cd ..

          curl -T deployment.zip "$UPLOAD_URL" \
            --header "Content-Type: application/zip"

          aws amplify start-deployment \
            --app-id ${{ vars.AMPLIFY_APP_ID }} \
            --branch-name ${{ github.ref_name }} \
            --job-id "$JOB_ID"

          echo "🚀 Deployment started: Job $JOB_ID (branch: ${{ github.ref_name }})"

  cleanup:
    if: github.event_name == 'delete'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Delete Amplify branch
        run: |
          BRANCH_NAME="${{ github.event.ref }}"
          echo "Cleaning up branch: $BRANCH_NAME"
          aws amplify delete-branch \
            --app-id ${{ vars.AMPLIFY_APP_ID }} \
            --branch-name "$BRANCH_NAME" \
            2>/dev/null || echo "Branch not found — already cleaned up"
